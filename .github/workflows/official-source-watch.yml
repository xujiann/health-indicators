name: Check Official Data Sources

on:
  schedule:
    - cron: "20 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check official source pages
        run: node scripts/check-official-sources.mjs

      - name: Upload watch result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: official-source-watch
          path: tmp/official-source-watch.json
          if-no-files-found: error
